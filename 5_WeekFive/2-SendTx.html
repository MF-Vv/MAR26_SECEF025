<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script src="../node_modules/web3.js-browser/build/web3.js"></script>
    <title>Document</title>
  </head>
  <body>
    <h1>Send Transaction</h1>
    <label for="">Sender: </label>
    <input
      type="text"
      id="sender"
      value="0x92bED9a6c51b525d9C606dE3a00921B7Ba08e811"
      style="min-width: 320px"
    />
    <br />
    <label for="">Receiver: </label>
    <input
      type="text"
      id="receiver"
      value="0xeF673108DF80aa09eA416cf727e3d86803407c91"
      style="min-width: 320px"
    />
    <br />

    <label for="">Amount(ETH): </label>
    <input
      type="number"
      id="amount"
      min="0"
      step="0.1"
      value="0.1"
    />
    <br />
    <button id="send">Send</button>

    <script src="./2-script.js"></script>
  </body>
</html>
