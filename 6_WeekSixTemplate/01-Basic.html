<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Web3.js with Ganache</title>
    <script src="../node_modules/web3.js-browser/build/web3.js"></script>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: rgb(220, 220, 220);
      }

      :root {
        --primary-100: #e2e0ff;
        --primary-200: #a5f3fc;
        --primary-300: #67e8f9;
        --primary-400: #22d3ee;
        --primary-500: #06b6d4;
        --primary-600: #0891b2;
        --primary-700: #0e7490;
        --primary-800: #155e75;
        --primary-900: #164e63;

        --shadow-1:
          0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px 0 rgba(0, 0, 0, 0.06);
        --shadow-2:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-3:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-4:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);

        --transition: 0.3s ease-in-out all;
      }

      .container {
        margin: 5rem auto;
        width: 90vw;
        max-width: 1180px;
        padding: 2rem;
        background: white;
        box-shadow: var(--shadow-3);
      }

      .container h1 {
        text-align: center;
      }
      button {
        margin: 10px;
        padding: 10px 20px;
        /* background-color: #4caf50; */
        background: var(--primary-500);
        color: white;
        border: none;
        cursor: pointer;
        transition: var(--transition);
      }
      button:hover {
        background: var(--primary-700);
      }
      #output {
        margin-top: 20px;
        overflow-x: auto; /* Allow horizontal scrolling if the table is too wide */
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto; /* Ensure columns resize to fit content */
        white-space: nowrap; /* Prevent wrapping */
      }
      table,
      th,
      td {
        border: 1px solid #ccc;
      }
      th,
      td {
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f4f4f4;
      }
      .key {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Web3.js with Ganache</h1>
      <button id="getAccountsBtn">
        Get Accounts
      </button>
      <button id="getBalanceBtn">
        Get Balance
      </button>
      <button id="sendTransactionBtn">
        Send Transaction
      </button>
      <button id="getBlockBtn">
        Get Latest Block
      </button>
      <button id="getTransactionBtn">
        Get Transaction
      </button>
      <button id="getGasPriceBtn">
        Get Gas Price
      </button>
      <button id="getChainIdBtn">
        Get Chain ID
      </button>
      <button id="getTransactionCountBtn">
        Get Transaction Count
      </button>

      <div id="output"></div>
    </div>

    <script>
      function convertBigInts(obj) {
        Object.keys(obj).forEach((key) => {
          if (typeof obj[key] === "bigint") {
            // Convert BigInt to string
            obj[key] = obj[key].toString();
          } else if (
            typeof obj[key] === "object" &&
            obj[key] !== null
          ) {
            // Recursively convert nested objects
            convertBigInts(obj[key]);
          }
        });
        return obj;
      }

      function createTableFromObject(obj) {
        // Create a table to display the transaction details
        let tableHTML = "<table>";
        tableHTML +=
          "<tr><th>Key</th><th>Value</th></tr>";

        // Loop through the transaction fields and add them to the table
        for (const [key, value] of Object.entries(
          obj,
        )) {
          tableHTML += `<tr><td class="key">${key}</td><td>${value}</td></tr>`;
        }

        tableHTML += "</table>";
        return tableHTML;
      }
    </script>

    <script>
      // Connect to the Ganache local blockchain
      const web3 = new Web3(
        "http://127.0.0.1:7545",
      ); // Make sure Ganache is running on this address

      document
        .getElementById("getAccountsBtn")
        .addEventListener("click", async () => {
          try {
            const accounts =
              await web3.eth.getAccounts();
            document.getElementById(
              "output",
            ).innerText =
              "Accounts: " + accounts.join(", ");
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getBalanceBtn")
        .addEventListener("click", async () => {
          try {
            const accounts =
              await web3.eth.getAccounts();
            const balance =
              await web3.eth.getBalance(
                accounts[0],
              );
            document.getElementById(
              "output",
            ).innerText =
              "Balance: " +
              web3.utils.fromWei(
                balance,
                "ether",
              ) +
              " ETH";
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("sendTransactionBtn")
        .addEventListener("click", async () => {
          try {
            const accounts =
              await web3.eth.getAccounts();

            // No txHash after tx success
            // const tx = await web3.eth.sendTransaction({
            //   from: accounts[0],
            //   to: accounts[1], // Change with another account on Ganache
            //   value: web3.utils.toWei("0.1", "ether"),
            // })
            // document.getElementById("output").innerText =
            //   "Transaction Successful: " + tx.transactionHash

            // With event
            web3.eth
              .sendTransaction({
                from: accounts[0],
                to: accounts[1], // Change with another account on Ganache
                value: web3.utils.toWei(
                  "0.1",
                  "ether",
                ),
              })
              .on("transactionHash", (txHash) => {
                document.getElementById(
                  "output",
                ).innerText =
                  "Transaction Successful: " +
                  txHash;
              });
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getBlockBtn")
        .addEventListener("click", async () => {
          try {
            const block =
              await web3.eth.getBlock("latest");

            const displayBlock =
              convertBigInts(block);

            // Remove the `logsBloom` & 'uncles' field
            delete displayBlock.logsBloom;
            delete displayBlock.uncles;

            // Create a table to display the block details
            let tableHTML =
              createTableFromObject(displayBlock);

            // Display the table in the output div
            document.getElementById(
              "output",
            ).innerHTML = tableHTML;
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getTransactionBtn")
        .addEventListener("click", async () => {
          try {
            const txHash = prompt(
              "Enter transaction hash: ",
            );
            const tx =
              await web3.eth.getTransaction(
                txHash,
              );

            const displayTx = convertBigInts(tx);

            // Create a table to display the transaction details
            let tableHTML =
              createTableFromObject(displayTx);

            // Display the table in the output div
            document.getElementById(
              "output",
            ).innerHTML = tableHTML;
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getGasPriceBtn")
        .addEventListener("click", async () => {
          try {
            const gasPrice =
              await web3.eth.getGasPrice();
            document.getElementById(
              "output",
            ).innerText =
              "Gas Price: " + gasPrice;
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getChainIdBtn")
        .addEventListener("click", async () => {
          try {
            const chainId =
              await web3.eth.getChainId();
            document.getElementById(
              "output",
            ).innerText = "Chain ID: " + chainId;
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });

      document
        .getElementById("getTransactionCountBtn")
        .addEventListener("click", async () => {
          try {
            const accounts =
              await web3.eth.getAccounts();
            const txCount =
              await web3.eth.getTransactionCount(
                accounts[0],
              );
            document.getElementById(
              "output",
            ).innerText =
              "Transaction Count: " + txCount;
          } catch (error) {
            document.getElementById(
              "output",
            ).innerText =
              "Error: " + error.message;
          }
        });
    </script>
  </body>
</html>
