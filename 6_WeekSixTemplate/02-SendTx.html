<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Send Ether</title>
    <script src="../node_modules/web3.js-browser/build/web3.js"></script>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      .container {
        width: 90vw;
        margin: 5rem auto;
        max-width: 1180px;
      }

      .container h1 {
        text-align: center;
        margin-bottom: 2rem;
      }
      form {
        max-width: 400px;
        margin: 0 auto;
      }
      label {
        display: block;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
      }
      button {
        padding: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }
      .message {
        margin-top: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Send Ether on Ganache</h1>
      <form id="transactionForm">
        <label for="sender"
          >Sender Address:</label
        >
        <input
          type="text"
          id="sender"
          placeholder="Enter sender address"
          required
        />

        <label for="receiver"
          >Receiver Address:</label
        >
        <input
          type="text"
          id="receiver"
          placeholder="Enter receiver address"
          required
        />

        <label for="amount">Amount (ETH):</label>
        <input
          type="number"
          id="amount"
          placeholder="Enter amount in ETH"
          min="1"
          required
        />

        <button type="submit">
          Send Transaction
        </button>
      </form>
      <div class="message" id="message"></div>
    </div>

    <script>
      // 1. Connect to the local Ganache blockchain

      document
        .getElementById("transactionForm")
        .addEventListener(
          "submit",
          async function (event) {
            event.preventDefault();

            const sender =
              document.getElementById(
                "sender",
              ).value;
            const receiver =
              document.getElementById(
                "receiver",
              ).value;
            const amount =
              document.getElementById(
                "amount",
              ).value;
            const messageDiv =
              document.getElementById("message");

            // 2. Convert to wei based on input amount

            try {
              /*
              Method 1 - Works using web3/dist/web3.min.js

              |---------------------------------|
              | Works using web3/dist/web3.min.js |
              |---------------------------------|
              
              1. The transaction sends directly with the `sendTransaction()` method.
              2. A receipt is returned immediately upon success.
              3. The method `sendTransaction()` returns a promise with the transaction receipt once the transaction is mined.
              4. After successful transaction completion, the receipt can be accessed and displayed with `transactionHash`.

              Optional:
                1. Once done, try switching to `web3.js-browser/build/web3.js`.
                2. You will notice that it will not return a promise or any information once the transaction is successfully sent. 
                3. Instead, you'll need to listen for events like
                    `transactionHash`,
                    `receipt`,  
                    `confirmation` for updates.
                4. Proceed to method 2 for implementation with event listeners
            */
              /*
              Method 2 - Event Listener Works using web3.js-browser/build/web3.js

              |------------------------------------------|
              | Works using web3.js-browser/build/web3.js|
              |------------------------------------------|
              
              1. This method does not return the transaction receipt immediately.
              2. Instead of receiving the receipt directly, you need to listen for the event using `.on('transactionHash')` and `.once('confirmation')`.
              3. The `transactionHash` event is triggered when the transaction is sent.
              4. The `confirmation` event is used to listen for the transaction's confirmation on the blockchain. It ensures that the transaction has been successfully mined.
              5. The `once()` method is used to automatically unsubscribe after receiving the confirmation once.
              6. This setup ensures proper handling of asynchronous transaction processing and the mining process.
            */
              // Method two implementation - event listener
            } catch (error) {
              console.log(error);
              messageDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
          },
        );
    </script>
  </body>
</html>
