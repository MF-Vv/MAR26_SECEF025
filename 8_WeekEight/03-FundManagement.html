<!doctype html>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      h2 {
        color: #333;
        text-align: center;
      }
      h4 {
        color: #555;
        margin-bottom: 15px;
      }
      .form-group {
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      label {
        width: 150px;
        font-weight: normal;
        margin-right: 10px;
        font-size: 0.9rem;
      }
      input[type="text"],
      input[type="number"] {
        width: calc(100% - 170px);
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 8px 15px;

        color: white;
        border: none;

      button:hover {
        background-color: #0056b3;
      }
      .section {
        padding: 20px;
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 30px;
        width: 100%;
        max-width: 500px;
      }
      .button-container {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
      }
      .container {
        width: 100%;
        max-width: 500px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Contract Funds Management</h2>

      <div class="section">
        <h4>
          Contract Balance:
          <span id="contractBalance">Loading...</span>
        </h4>
      </div>

      <!-- Send Funds Section -->
      <div class="section">
        <h4>Send Funds To Smart Contract</h4>
        <div class="form-group">
          <label for="privateKeyInput">Private Key:</label>
          <input
            type="text"
            id="privateKeyInput"
            value="0x1c2119e466f6505fc9e51ff0206f93a3998762c678ac7cbbb5594e1e8deb3ad5"
          />
        </div>
        <div class="form-group">
          <label for="amountInput">Amount (ETH):</label>
          <input type="number" id="amountInput" value="0.1" />
        </div>
        <div class="button-container">
          <button id="sendFundBtn">Send Funds</button>
        </div>
      </div>

      <!-- Withdraw Funds Section -->
      <div class="section">
        <h4>Withdraw Funds With Specific Amount</h4>
        <div class="form-group">
          <label for="privateKeyWithdrawInput">Private Key:</label>
          <input
            type="text"
            id="privateKeyWithdrawInput"
            value="0x1c2119e466f6505fc9e51ff0206f93a3998762c678ac7cbbb5594e1e8deb3ad5"
          />
        </div>

        <div class="form-group">
          <label for="withdrawAmountInput">Amount (Wei):</label>
          <input
            type="text"
            id="withdrawAmountInput"
            value="100000000000000000"
          />
        </div>

        <div class="button-container">
          <button id="withdrawFundBtn">Withdraw Funds</button>
        </div>
      </div>
    </div>

    <!-- Toast JS -->
    <script>
      // Toast message function
      // Initialize Notyf
      const notyf = new Notyf({
        duration: 3000,
        position: { x: "right", y: "top" },
      });

      function showToast({ type, message }) {
        if (type === "success") {
          // Notyf Success
          notyf.success(`${message}`);
        } else if (type === "error") {
          // Notyf Error
          notyf.error(`${message}`);
        } else {
          console.error("Invalid toast type. Use 'success' or 'error'.");
        }
      }

      // showToast({
      //   type: "success",
      //   message: "Transaction Successful.",
      // });
      // showToast({
      //   type: "error",
      //   message: "Transaction Failed!",
      // });
    </script>

    <!-- Web3 JS -->
    <script>
      // 1. Connect to the local Ganache blockchain
      const web3 = new Web3("http://localhost:7545");

      // 2. Set the contract address and ABI (Application Binary Interface)
      const CONTRACT_ADDRESS = "0x3fBfDD47969692dF95D3AE2Ea843607B68be19C2";
      const ABI = [

          ],

        },
        {
          inputs: [],

          outputs: [
            {

          ],

        },
        {

          ],

        },
        {
          inputs: [],

          outputs: [
            {
              internalType: "bool",

          ],
          stateMutability: "view",

        },
        {
          inputs: [],

        {

          ],

        },
        {

        },
        {

          ],

        },
        {

        },
        {

            },

            },
          ],
          name: "setAddressMapping",
          outputs: [],

        },
        {
          inputs: [
            {
              internalType: "uint256",
              name: "_newUint",

            },
            {

            },
            {

              type: "bool",
            },
            {

              type: "string",
            },
            {

            },
            {

            },
          ],
          name: "setAllData",
          outputs: [],

          type: "function",
        },
        {
          inputs: [
            {
              internalType: "address",
              name: "_newAddress",
              type: "address",
            },
          ],
          name: "setStoredAddress",
          outputs: [],
          stateMutability: "nonpayable",
          type: "function",
        },
        {
          inputs: [
            {
              internalType: "bool",
              name: "_newBool",
              type: "bool",
            },
          ],
          name: "setStoredBool",
          outputs: [],

        },
        {
          inputs: [

              type: "string",
            },
          ],
          name: "setStoredString",
          outputs: [],

        },
        {
          inputs: [

              type: "uint256",
            },
          ],
          name: "setStoredUint",
          outputs: [],

        },
        {
          inputs: [
            {
              internalType: "uint256",
              name: "_amount",
              type: "uint256",
            },
          ],
          name: "withdraw",
          outputs: [],
          stateMutability: "nonpayable",
          type: "function",
        },
        {
          stateMutability: "payable",
          type: "receive",
        },
      ];

      // 3. Create the contract instance
      const contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);

      const balanceSpan = document.getElementById("contractBalance");
      const sendFundPrivateKey = document.getElementById("privateKeyInput");
      const sendFundAmount = document.getElementById("amountInput");

      async function getContractBalance() {
        try {
          // 1. Encode function signature
          const funcSign = web3.eth.abi.encodeFunctionSignature(
            "getContractBalance()",
          );

          // 2. Call the contract method
          const result = await web3.eth.call({
            to: CONTRACT_ADDRESS,
            data: funcSign,
          });

          // 3. Decode the result - hexToNumberString
          const contractBalance = web3.utils.hexToNumberString(result);

          // 4. Display the balance
          balanceSpan.innerText = contractBalance;

          //
        } catch (error) {
          console.error(error);
          balanceSpan.innerHTML = "Error fetching balance.";
        }
      }

      // Send funds via receive() special function
      async function sendFundsViaSignedTx() {
        const privateKey = sendFundPrivateKey.value;
        const valueInETH = sendFundAmount.value;

        try {
          // 1. Derive account from private key
          const account = web3.eth.accounts.privateKeyToAccount(privateKey);

          // 5. Create transaction object
          const tx = {
            to: CONTRACT_ADDRESS,
            gas: 210000,
            value: web3.utils.toWei(valueInETH, "ether"), // 2. Convert value to Wei
            gasPrice: await web3.eth.getGasPrice(), // 3. Get gas price
            nonce: await web3.eth.getTransactionCount(account.address), // 4. Get nonce
          };

          // 6. Sign transaction
          const signedTx = await web3.eth.accounts.signTransaction(
            tx,
            privateKey,
          );

          // 7. Send signed transaction

          web3.eth
            .sendSignedTransaction(signedTx.rawTransaction)
            // .on("receipt", (r) => {})
            // .on("transactionHash", (h) => {})
            .once("confirmation", async (cn, r) => {
              await getContractBalance();
              showToast({
                type: "success",
                message: "Transaction Successful.",
              });
            })
            .on("error", (e) => {
              console.log(e);
              showToast({
                type: "error",
                message: "Transaction Failed!",
              });
            });

          // 8. Listen for transaction events
        } catch (error) {
          console.error(error);
          showToast({
            type: "error",
            message: "Transaction Failed!",
          });
        }
      }

      // Send funds via custom function
      async function sendFundsViaEncodeABI() {
        const privateKey = sendFundPrivateKey.value;
        const valueInETH = sendFundAmount.value;

        try {
          // 1. Derive account from private key
          const account = web3.eth.accounts.privateKeyToAccount(privateKey);

          // 2. Encode ABI
          const data = contract.methods.receiveFunds().encodeABI();

          // 5. Create transaction object
          const tx = {
            to: CONTRACT_ADDRESS,
            gas: 210000, // 3. Get gas price
            value: web3.utils.toWei(valueInETH, "ether"),
            gasPrice: await web3.eth.getGasPrice(),
            nonce: await web3.eth.getTransactionCount(account.address), // 4. Get nonce
            data: data,
          };

          // 6. Sign transaction
          const signedTx = await web3.eth.accounts.signTransaction(
            tx,
            privateKey,
          );

          web3.eth
            .sendSignedTransaction(signedTx.rawTransaction)
            .once("confirmation", async (cn, r) => {
              await getContractBalance();
              showToast({
                type: "success",
                message: "Transaction Successful.",
              });
            })
            .on("error", (e) => {
              console.log(e);
              showToast({
                type: "error",
                message: "Transaction Failed!",
              });
            });
        } catch (error) {
          console.error(error);
          showToast({
            type: "error",
            message: "Transaction Failed!",
          });
        }
      }

      /*
        Withdraw funds
          - privateKeyToAccount
          - estimateGas & getGasPrice
          - encodeABI
          - signTransaction
          - sendSignedTransaction
          - on(listen event)
      */
      async function withdrawFundsViaSignedTx() {
        const privateKey = document.getElementById(
          "privateKeyWithdrawInput",
        ).value;
        const amountInWei = document.getElementById(
          "withdrawAmountInput",
        ).value;

        try {
          // 1. Derive account from private key
          const account = web3.eth.accounts.privateKeyToAccount(privateKey);

          // 2. Get gas price
          const gasPrice = await web3.eth.getGasPrice();

          // 3. Encode ABI
          const data = contract.methods.withdraw(amountInWei).encodeABI();

          // 4. Get nonce
          const nonce = await web3.eth.getTransactionCount(account.address);

          // 5. Create transaction object
          const tx = {
            to: CONTRACT_ADDRESS,
            gas: 210000,
            gasPrice,
            nonce,
            data,
          };

          // 6. Sign transaction
          const signedTx = await web3.eth.accounts.signTransaction(
            tx,
            privateKey,
          );

          // 7. Send signed transaction
          web3.eth
            .sendSignedTransaction(signedTx.rawTransaction)
            .once("confirmation", async (cn, r) => {
              await getContractBalance();
              showToast({
                type: "success",
                message: "Transaction Successful.",
              });
            })
            .on("error", (e) => {
              console.log(e);
              showToast({
                type: "error",
                message: "Transaction Failed!",
              });
            });

          // 8. Listen for transaction events
        } catch (error) {
          showToast({
            type: "error",
            message: "Transaction Failed!",
          });
          console.error(error);

          // 1. Stringify the error message

          // 2. Clean up the error message

          // 3. Parse the error message

          // 4. Display the error message
        }
      }

      document
        .getElementById("sendFundBtn")
        .addEventListener("click", sendFundsViaSignedTx);

      document
        .getElementById("withdrawFundBtn")
        .addEventListener("click", withdrawFundsViaSignedTx);

      window.onload = async () => {
        await getContractBalance();
      };
    </script>
  </body>
</html>
